<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell('companies', '目标公司', '维护官网、招聘页与内推信息，投递时可重复引用同一份档案。', ~{::#headerActions}, ~{::#pageBody})}">
<body>
<th:block id="headerActions">
    <a class="btn btn-primary" th:href="@{/companies/new}">+ 新增公司</a>
</th:block>
<th:block id="pageBody">
    <div class="card">
        <h2>导入公司 seed</h2>
        <p class="muted">已存在的公司将跳过，不覆盖已有档案。</p>
        <form class="actions" method="post" th:action="@{/companies/import-seed}">
            <select name="seed" class="select-inline">
                <option th:each="pack : ${seedPacks}"
                        th:value="${pack.id()}"
                        th:text="${pack.title() + ' (' + pack.entryCount() + ')'}">seed</option>
            </select>
            <button class="btn btn-primary btn-sm" type="submit">导入 seed</button>
        </form>
        <form class="actions" method="get" th:action="@{/companies}">
            <input type="hidden" name="q" th:if="${searchQuery != null and !searchQuery.isBlank()}" th:value="${searchQuery}"/>
            <input type="hidden" name="industry" th:if="${selectedIndustry != null and !selectedIndustry.isBlank()}"
                   th:value="${selectedIndustry}"/>
            <select name="previewSeed" class="select-inline">
                <option th:each="pack : ${seedPacks}"
                        th:value="${pack.id()}"
                        th:selected="${pack.id() == previewSeedId}"
                        th:text="${pack.title() + ' (' + pack.entryCount() + ')'}">seed</option>
            </select>
            <button class="btn btn-sm" type="submit">预览 seed</button>
        </form>
    </div>

    <div class="card preview-panel" th:if="${seedPreview != null}">
        <h2 th:text="${seedPreview.title() + '（共 ' + seedPreview.totalCount() + ' 家，预览前 ' + seedPreview.samples().size() + ' 家）'}">预览</h2>
        <ul>
            <li th:each="entry : ${seedPreview.samples()}"
                th:text="${entry.name() + (entry.industry() != null ? ' · ' + entry.industry() : '')}">公司</li>
        </ul>
        <a class="btn btn-sm" th:href="@{/companies(q=${searchQuery}, industry=${selectedIndustry})}">关闭预览</a>
    </div>
    <p th:if="${previewSeedError != null}" class="muted" th:text="${previewSeedError}"></p>

    <div class="card">
        <form class="toolbar" method="get" th:action="@{/companies}">
            <input type="hidden" name="industry" th:if="${selectedIndustry != null and !selectedIndustry.isBlank()}"
                   th:value="${selectedIndustry}"/>
            <input class="search-input" name="q" type="search" placeholder="按公司名搜索…" th:value="${searchQuery}"/>
            <button class="btn btn-primary btn-sm" type="submit">搜索</button>
            <a class="btn btn-text btn-sm" th:if="${searchQuery != null and !searchQuery.isBlank()}"
               th:href="@{/companies(industry=${selectedIndustry})}">清除搜索</a>
        </form>
    </div>

    <div class="chip-row" th:if="${!industries.isEmpty()}">
        <a class="btn btn-sm chip" th:classappend="${selectedIndustry == null} ? ' is-active' : ''"
           th:href="@{/companies(q=${searchQuery})}">全部行业</a>
        <a class="btn btn-sm chip" th:each="ind : ${industries}"
           th:classappend="${selectedIndustry == ind} ? ' is-active' : ''"
           th:href="@{/companies(industry=${ind}, q=${searchQuery})}"
           th:text="${ind}">行业</a>
    </div>

    <div class="card">
        <table class="data-table" th:if="${!companies.isEmpty()}">
            <thead>
            <tr><th>公司</th><th>行业</th><th>内推码</th><th>招聘页</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="c : ${companies}">
                <td><a th:href="@{/companies/{id}(id=${c.id})}" th:text="${c.name}">公司</a></td>
                <td th:text="${c.industry != null ? c.industry : '-'}">行业</td>
                <td th:text="${c.referralCode != null ? c.referralCode : '-'}">内推码</td>
                <td>
                    <a th:if="${c.careersUrl != null}" th:href="${c.careersUrl}" target="_blank" rel="noopener">打开</a>
                    <span th:if="${c.careersUrl == null}" class="muted">-</span>
                </td>
                <td class="actions">
                    <a class="btn btn-text btn-sm" th:href="@{/companies/{id}(id=${c.id})}">详情</a>
                    <a class="btn btn-text btn-sm" th:href="@{/companies/{id}/edit(id=${c.id})}">编辑</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${companies.isEmpty() and searchQuery != null and !searchQuery.isBlank()}" class="empty-state">
            <p>没有匹配「<span th:text="${searchQuery}"></span>」的公司。</p>
            <a class="btn btn-text" th:href="@{/companies(industry=${selectedIndustry})}">清除搜索</a>
        </div>
        <div th:if="${companies.isEmpty() and (searchQuery == null or searchQuery.isBlank())}" class="empty-state">
            <p>还没有公司档案</p>
            <a class="btn btn-primary" th:href="@{/companies/new}">添加第一家目标公司</a>
        </div>
    </div>
</th:block>
</body>
</html>
