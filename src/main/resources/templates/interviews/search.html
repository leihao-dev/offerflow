<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell('interviews-search', '复盘搜索', '跨全部投递搜索面试复盘内容。', null, ~{::#pageBody})}">
<body>
<th:block id="pageBody">
    <p class="muted" th:if="${!hasQuery}">输入关键词搜索全部面试复盘（问题、自评、改进、公司名、岗位）。</p>

    <div class="card">
        <form class="toolbar" method="get" th:action="@{/interviews/search}">
            <input class="search-input" name="q" type="search" placeholder="例如：线程池、HashMap、项目深挖…"
                   th:value="${searchQuery}"/>
            <button class="btn btn-primary btn-sm" type="submit">搜索</button>
            <a class="btn btn-text btn-sm" th:if="${hasQuery}" th:href="@{/interviews/search}">清除</a>
        </form>
    </div>

    <div th:if="${hasQuery and #lists.isEmpty(hits)}" class="card empty-state">
        没有匹配「<span th:text="${searchQuery}"></span>」的复盘。
    </div>

    <div th:if="${hasQuery and !#lists.isEmpty(hits)}" class="card">
        <table class="data-table">
            <thead>
            <tr><th>日期</th><th>公司 · 岗位</th><th>轮次</th><th>摘要</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="hit : ${hits}">
                <td th:text="${hit.interviewDate()}">日期</td>
                <td>
                    <strong th:text="${hit.companyName()}">公司</strong>
                    <span class="muted" th:text="' · ' + ${hit.positionTitle()}">岗位</span>
                </td>
                <td th:text="${hit.roundLabel() != null ? hit.roundLabel() : '-'}">轮次</td>
                <td class="muted" th:text="${hit.snippet()}">摘要</td>
                <td><a class="btn btn-text btn-sm" th:href="@{/applications/{id}(id=${hit.applicationId()})}">查看投递</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</th:block>
</body>
</html>
