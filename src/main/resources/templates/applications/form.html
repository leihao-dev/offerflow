<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell(${activePage}, ${pageTitle}, '', null, ~{::#pageBody})}">
<body>
<th:block id="pageBody">
    <div class="card">
        <form th:action="${form.id != null} ? @{/applications/{id}(id=${form.id})} : @{/applications}"
              method="post" th:object="${form}">
            <p class="error" th:if="${#fields.hasAnyErrors()}" role="alert">请修正标红字段后重新提交。</p>
            <input type="hidden" th:field="*{id}"/>

            <label for="companyId">公司 *</label>
            <select id="companyId" th:field="*{companyId}">
                <option value="">手动输入公司名称</option>
                <option th:each="c : ${companies}" th:value="${c.id}" th:text="${c.name}">公司</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('companyProvided')}" th:errors="*{companyProvided}"></div>
            <p class="muted">
                没有目标公司？<a th:href="@{/companies/new}" target="_blank" rel="noopener">新建公司档案</a>
            </p>

            <div id="manualCompanyRow">
                <label for="companyName">公司名称（手动输入）*</label>
                <input id="companyName" th:field="*{companyName}"/>
            </div>

            <label for="positionTitle">岗位名称 *</label>
            <input id="positionTitle" th:field="*{positionTitle}"/>
            <div class="error" th:if="${#fields.hasErrors('positionTitle')}" th:errors="*{positionTitle}"></div>

            <label for="source">投递渠道</label>
            <input id="source" th:field="*{source}" placeholder="Boss / 内推 / 官网"/>

            <label for="stage">当前阶段 *</label>
            <select id="stage" th:field="*{stage}">
                <option th:each="s : ${stages}" th:value="${s}" th:text="${T(com.offerflow.web.StageLabels).label(s)}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('stage')}" th:errors="*{stage}"></div>

            <label for="appliedAt">投递日期 *</label>
            <input id="appliedAt" type="date" th:field="*{appliedAt}"/>
            <div class="error" th:if="${#fields.hasErrors('appliedAt')}" th:errors="*{appliedAt}"></div>

            <label for="nextFollowUpAt">下次跟进日期</label>
            <input id="nextFollowUpAt" type="date" th:field="*{nextFollowUpAt}"/>
            <div class="error" th:if="${#fields.hasErrors('followUpOnOrAfterAppliedAt')}" th:errors="*{followUpOnOrAfterAppliedAt}"></div>

            <label for="salaryRange">薪资范围</label>
            <input id="salaryRange" th:field="*{salaryRange}" placeholder="20-30K"/>

            <label for="jdContent">JD 原文</label>
            <textarea id="jdContent" th:field="*{jdContent}"></textarea>

            <label for="companyNotes">本岗位调研笔记</label>
            <textarea id="companyNotes" th:field="*{companyNotes}"></textarea>

            <label for="prepChecklist">准备清单（每行一项）</label>
            <textarea id="prepChecklist" th:field="*{prepChecklist}"></textarea>

            <label>
                <input type="checkbox" th:field="*{prepDone}"/> 准备工作已完成
            </label>

            <div class="actions">
                <button class="btn btn-primary" type="submit">保存</button>
                <a class="btn" th:href="${form.id != null} ? @{/applications/{id}(id=${form.id})} : @{/applications}">取消</a>
            </div>
        </form>
    </div>
    <script>
        (function () {
            var companySelect = document.getElementById('companyId');
            var manualRow = document.getElementById('manualCompanyRow');
            if (!companySelect || !manualRow) {
                return;
            }
            function syncManualCompanyRow() {
                var useManual = !companySelect.value;
                manualRow.style.display = useManual ? 'block' : 'none';
            }
            companySelect.addEventListener('change', syncManualCompanyRow);
            syncManualCompanyRow();
        })();
    </script>
</th:block>
</body>
</html>
