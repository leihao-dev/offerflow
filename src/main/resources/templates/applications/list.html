<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>投递列表 · OfferFlow</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:replace="~{fragments/nav :: nav('applications')}"></header>
<main class="container">
    <div th:replace="~{fragments/messages :: flash}"></div>
    <h1>投递列表</h1>

    <div class="card" style="margin-bottom:16px;">
        <form class="actions" method="get" th:action="@{/applications}">
            <input type="hidden" name="stage" th:if="${selectedStage != null}" th:value="${selectedStage}"/>
            <input name="q" type="search" placeholder="按公司或岗位搜索…" th:value="${searchQuery}"
                   style="flex:1;min-width:180px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font:inherit;"/>
            <button class="btn btn-primary btn-sm" type="submit">搜索</button>
            <a class="btn btn-sm" th:if="${searchQuery != null and !searchQuery.isBlank()}"
               th:href="@{/applications(stage=${selectedStage})}">清除搜索</a>
        </form>
    </div>

    <div class="actions">
        <a class="btn btn-sm" th:classappend="${selectedStage == null} ? 'btn-primary' : ''"
           th:href="@{/applications(q=${searchQuery})}">全部</a>
        <a class="btn btn-sm" th:each="s : ${stages}"
           th:classappend="${selectedStage == s} ? 'btn-primary' : ''"
           th:href="@{/applications(stage=${s}, q=${searchQuery})}"
           th:text="${T(com.offerflow.web.StageLabels).label(s)}">阶段</a>
    </div>

    <div class="card">
        <table th:if="${!applications.isEmpty()}">
            <thead>
            <tr><th>公司</th><th>岗位</th><th>阶段</th><th>投递日</th><th>下次跟进</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="app : ${applications}"
                th:classappend="${T(com.offerflow.support.FollowUpRules).isOverdue(app, today)} ? 'row-overdue' : ''">
                <td>
                    <a th:if="${app.company != null}" th:href="@{/companies/{id}(id=${app.company.id})}" th:text="${app.companyName}">公司</a>
                    <span th:if="${app.company == null}" th:text="${app.companyName}">公司</span>
                </td>
                <td th:text="${app.positionTitle}">岗位</td>
                <td><span class="badge" th:text="${T(com.offerflow.web.StageLabels).label(app.stage)}">阶段</span></td>
                <td th:text="${app.appliedAt}">日期</td>
                <td>
                    <span th:text="${app.nextFollowUpAt != null ? app.nextFollowUpAt : '-'}">跟进</span>
                    <span class="overdue-tag" th:if="${T(com.offerflow.support.FollowUpRules).isOverdue(app, today)}">逾期</span>
                </td>
                <td class="actions">
                    <a class="btn btn-sm" th:href="@{/applications/{id}(id=${app.id})}">详情</a>
                    <a class="btn btn-sm" th:href="@{/applications/{id}/edit(id=${app.id})}">编辑</a>
                </td>
            </tr>
            </tbody>
        </table>
        <p th:if="${applications.isEmpty() and searchQuery != null and !searchQuery.isBlank()}" class="muted">
            没有匹配「<span th:text="${searchQuery}"></span>」的投递。
            <a th:href="@{/applications(stage=${selectedStage})}">清除搜索</a>
        </p>
        <p th:if="${applications.isEmpty() and (searchQuery == null or searchQuery.isBlank())}" class="muted">暂无记录。</p>
    </div>
</main>
</body>
</html>
