<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: shell('applications', '模板预览', ${pageSubtitle}, ~{::#headerActions}, ~{::#pageBody})}">
<body>
<th:block id="headerActions">
    <a class="btn btn-text btn-sm" th:href="@{/applications/{id}(id=${jobApplication.id})}">← 返回投递详情</a>
</th:block>
<th:block id="pageBody">
    <h2 th:text="${templatePreview.title()}">模板</h2>
    <div class="actions">
        <a class="btn btn-sm" th:each="pack : ${templatePacks}"
           th:classappend="${pack.id() == selectedTemplateId} ? ' btn-primary' : ''"
           th:href="@{/applications/{id}/preview-template(id=${jobApplication.id}, template=${pack.id()})}"
           th:text="${pack.title()}">模板</a>
    </div>

    <div class="card">
        <h2>准备清单（前 8 行）</h2>
        <pre class="pre-wrap" th:text="${templatePreview.prepExcerpt()}">prep</pre>
    </div>

    <div class="card">
        <h2>复盘框架摘要</h2>
        <p th:if="${templatePreview.debriefRoundLabel() != null}">
            <strong>默认轮次：</strong><span th:text="${templatePreview.debriefRoundLabel()}"></span>
        </p>
        <pre class="pre-wrap" th:text="${templatePreview.debriefSummary()}">debrief</pre>
    </div>

    <div class="actions">
        <form method="post" th:action="@{/applications/{id}/apply-template(id=${jobApplication.id})}" class="form-inline">
            <input type="hidden" name="template" th:value="${selectedTemplateId}"/>
            <button class="btn btn-primary btn-sm" type="submit">填充准备清单</button>
        </form>
        <a class="btn btn-sm"
           th:href="@{/applications/{id}/interviews/new(id=${jobApplication.id}, template=${selectedTemplateId})}">
            带此模板新增复盘
        </a>
    </div>
</th:block>
</body>
</html>
